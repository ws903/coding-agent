name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }}

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short --cov=agent --cov-report=json --cov-fail-under=90

      - name: Extract coverage percentage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14' && github.ref == 'refs/heads/main'
        run: |
          COV=$(python -c "import json; print(json.load(open('coverage.json'))['totals']['percent_covered_display'])")
          echo "COVERAGE=$COV" >> $GITHUB_ENV

      - name: Update coverage badge
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14' && github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: d00dd6063816632622587ade226668a3
          filename: coverage-badge.json
          label: coverage
          message: ${{ env.COVERAGE }}%
          valColorRange: ${{ env.COVERAGE }}
          minColorRange: 50
          maxColorRange: 90

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Verify lockfile is up-to-date
        run: uv lock --check

      - name: Check formatting
        run: uvx ruff format --check src/ tests/

      - name: Check linting
        run: uvx ruff check src/ tests/
